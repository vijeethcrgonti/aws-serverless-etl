name: ETL Pipeline CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=lambda --cov=glue --cov-report=xml
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          GLUE_JOB_NAME: test-glue-job
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff black
      - run: ruff check lambda/ glue/ airflow/ cdk/
      - run: black --check lambda/ glue/ airflow/ cdk/
  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: false
    steps:
      - uses: actions/checkout@v4
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [cdk-synth]
    if: false
    steps:
      - uses: actions/checkout@v4
